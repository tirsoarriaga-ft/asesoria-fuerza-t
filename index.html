function toFrac(n){if(n<=0)return'0';const w=Math.floor(n),d=n-w;const fs=[[0,''],[0.25,'¼'],[0.333,'⅓'],[0.5,'½'],[0.667,'⅔'],[0.75,'¾']];let best=fs[0];fs.forEach(f=>{if(Math.abs(d-f[0])<Math.abs(d-best[0]))best=f;});if(Math.abs(d-1)<Math.abs(d-best[0]))return String(w+1);return(w>0?String(w):'')+best[1]||'0';}
function calcP(item,tmpl){if(item.fx)return{v:item.vB+' '+item.vU,g:null};const f=tmpl/BASE_T;return{v:toFrac(item.vB*f)+' '+item.vU,g:Math.round(item.gB*f)+'g'};}

function getWk(off=0){
  const now=new Date();now.setDate(now.getDate()+off*7);
  const d=now.getDay(),diff=d===0?-6:1-d;
  const mon=new Date(now);mon.setDate(now.getDate()+diff);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const id=mon.toISOString().split('T')[0];
  const fmt=d=>d.toLocaleDateString('es-AR',{day:'numeric',month:'short'});
  return{id,label:`${fmt(mon)} — ${fmt(sun)}`};
}
function calcE1RM(kg,reps){if(!reps||reps<=0)return kg;return Math.round(kg*(1+reps/30)*10)/10;}

// Semana secuencial basada en contador localStorage — sin cálculos de fechas
function getWkForNum(user,num){
  const startId=localStorage.getItem(`ase_${user}_startdate`)||new Date().toISOString().split('T')[0];
  const startMon=new Date(startId+'T12:00:00');
  const wkMon=new Date(startMon);wkMon.setDate(startMon.getDate()+(num-1)*7);
  const wkSun=new Date(wkMon);wkSun.setDate(wkMon.getDate()+6);
  const fmt=d=>d.toLocaleDateString('es-AR',{day:'numeric',month:'short'});
  return{id:`sem_${num}`,num,label:`${fmt(wkMon)} — ${fmt(wkSun)}`};
}

// ── CHARTS ────────────────────────────────────────────────────────────
function LineChart({data,color,h:ht=140,labels}){
  if(!data||data.length<2)return null;
  const W=300,H=ht,pad={t:10,b:24,l:32,r:10};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const mn=Math.min(...data)*0.97,mx=Math.max(...data)*1.03;
  const x=i=>pad.l+i/(data.length-1)*iW;
  const y=v=>pad.t+(1-(v-mn)/(mx-mn))*iH;
  const pts=data.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const poly=pts+` ${x(data.length-1)},${H-pad.b} ${x(0)},${H-pad.b}`;
  const step=Math.ceil(data.length/5);
  return h('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`,style:{display:'block'}},
    h('polygon',{points:poly,fill:color,opacity:'0.08'}),
    h('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:'2',strokeLinejoin:'round'}),
    data.map((v,i)=>(i%step===0||i===data.length-1)?h('circle',{key:i,cx:x(i),cy:y(v),r:'3',fill:color}):null),
    labels&&labels.map((l,i)=>(i%step===0||i===labels.length-1)?h('text',{key:i,x:x(i),y:H-6,textAnchor:'middle',fontSize:'9',fill:'#999'},l):null),
    h('text',{x:pad.l-2,y:y(mn)+4,textAnchor:'end',fontSize:'9',fill:'#999'},mn.toFixed(1)),
    h('text',{x:pad.l-2,y:y(mx)+4,textAnchor:'end',fontSize:'9',fill:'#999'},mx.toFixed(1))
  );
}
function DualBarChart({data}){
  if(!data||data.length<1)return null;
  const W=300,H=100,pad={t:8,b:22,l:20,r:8};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const bW=Math.min(10,iW/data.length/2-2);
  const gap=iW/data.length;
  return h('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`,style:{display:'block'}},
    h('line',{x1:pad.l,y1:pad.t+iH,x2:W-pad.r,y2:pad.t+iH,stroke:'rgba(0,0,0,0.08)',strokeWidth:'1'}),
    data.map((d,i)=>{
      const cx=pad.l+i*gap+gap/2;
      const sH=(d.sleep/7)*iH,tH=(d.toxics/7)*iH;
      return h('g',{key:i},
        h('rect',{x:cx-bW-1,y:pad.t+iH-sH,width:bW,height:Math.max(sH,1),fill:G,rx:'2'}),
        h('rect',{x:cx+1,y:pad.t+iH-tH,width:bW,height:Math.max(tH,1),fill:R,rx:'2'}),
        h('text',{x:cx,y:H-6,textAnchor:'middle',fontSize:'8',fill:'#999'},d.label)
      );
    })
  );
}

// ── TRAINING ──────────────────────────────────────────────────────────
function Training({exes,setExes,setSaved,user,cfg,setCfg,sessionReps,setSessionReps,sessionKg,setSessionKg,hist}){
  const defCfg={num:3,assign:{A:[],B:[],C:[],D:[]}};
  if(!cfg)cfg=defCfg;
  const [configuring,setConfiguring]=useState(false);
  const [activeSess,setActiveSess]=useState('A');
  const [tut,setTut]=useState(null);
  const [editKg,setEditKg]=useState(null);
  const [kgVal,setKgVal]=useState('');
  const [cfgSess,setCfgSess]=useState('A');
  const SESS=['A','B','C','D'].slice(0,cfg.num);

  const saveCfg=nc=>{setCfg(nc);localStorage.setItem(CFG_KEY(user),JSON.stringify(nc));};
  const toggleEx=(s,id)=>{const cur=cfg.assign[s]||[];const na=cur.includes(id)?cur.filter(x=>x!==id):[...cur,id];saveCfg({...cfg,assign:{...cfg.assign,[s]:na}});};
  const setNum=n=>{const na={};['A','B','C','D'].slice(0,n).forEach(s=>{na[s]=cfg.assign[s]||[];});saveCfg({...cfg,num:n,assign:na});};

  const getKg=ex=>(sessionKg?.[activeSess]?.[ex.id])||ex.kg;
  const getRep=(sess,exId,k)=>sessionReps?.[sess]?.[exId]?.[k]||'';

  // e1RM de la sesión anterior para este ejercicio+sesión
  const prevE1RM=(ex)=>{
    if(!hist||hist.length===0)return null;
    for(let i=hist.length-1;i>=0;i--){
      const w=hist[i];
      const reps=w.sr?.[activeSess]?.[ex.id];
      if(!reps)continue;
      const bestReps=Math.max(parseInt(reps.r1)||0,parseInt(reps.r2)||0);
      if(bestReps===0)continue;
      const kg=(w.sk?.[activeSess]?.[ex.id])||w.e?.find(e=>e.id===ex.id)?.kg||ex.kg;
      return calcE1RM(kg,bestReps);
    }
    return null;
  };
  const setRep=(sess,exId,k,v)=>{
    setSessionReps(prev=>{const next={...prev};if(!next[sess])next[sess]={};if(!next[sess][exId])next[sess][exId]={};next[sess][exId][k]=v;return next;});
    setSaved(false);
  };
  const nKg=ex=>{const reps=sessionReps?.[activeSess]?.[ex.id]||{};const m=Math.max(parseInt(reps.r1)||0,parseInt(reps.r2)||0);return m>=ex.hi?rKg(getKg(ex)*1.05):null;};
  const doSaveKg=(ex,val)=>{
    const kg=parseFloat(val);if(isNaN(kg)||kg<=0)return setEditKg(null);
    const newSK={...sessionKg};if(!newSK[activeSess])newSK[activeSess]={};newSK[activeSess][ex.id]=kg;
    setSessionKg(newSK);localStorage.setItem(`ase_${user}_sessKg`,JSON.stringify(newSK));
    setEditKg(null);setSaved(false);
  };
  const sessExes=(cfg.assign[activeSess]||[]).map(id=>exes.find(e=>e.id===id)).filter(Boolean);

  if(configuring)return h('div',null,
    h('div',{style:card},h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},h('div',{style:{fontSize:'15px',fontWeight:'800'}},'⚙️ Configurar rutina'),h('button',{onClick:()=>setConfiguring(false),style:{background:G,color:'#fff',border:'none',borderRadius:'8px',padding:'8px 16px',fontSize:'13px',fontWeight:'700',cursor:'pointer'}},'Listo ✓'))),
    h('div',{style:card},h('div',{style:lbl},'Cantidad de sesiones'),h('div',{style:{display:'flex',gap:'8px'}},[2,3,4].map(n=>h('button',{key:n,onClick:()=>setNum(n),style:{flex:1,padding:'14px',fontSize:'16px',fontWeight:cfg.num===n?'800':'400',cursor:'pointer',borderRadius:'10px',border:'2px solid',color:cfg.num===n?'#fff':'#999',background:cfg.num===n?G:'#fff',borderColor:cfg.num===n?G:'rgba(0,0,0,0.1)'}},n+' sesiones')))),
    h('div',{style:card},
      h('div',{style:{...lbl,marginBottom:'10px'}},'Ejercicios por sesión'),
      h('div',{style:{display:'flex',gap:'4px',marginBottom:'14px'}},SESS.map(s=>h('button',{key:s,onClick:()=>setCfgSess(s),style:{flex:1,padding:'10px 4px',fontSize:'13px',fontWeight:cfgSess===s?'800':'400',cursor:'pointer',borderRadius:'8px',border:'2px solid',color:cfgSess===s?'#fff':'#999',background:cfgSess===s?B:'#fff',borderColor:cfgSess===s?B:'rgba(0,0,0,0.1)'}},
        'Ses. '+s,' ',h('span',{style:{fontSize:'10px',opacity:0.8}},'('+((cfg.assign[s]||[]).length)+')')
      ))),
      exes.map(ex=>{const assigned=(cfg.assign[cfgSess]||[]).includes(ex.id);
        return h('div',{key:ex.id,onClick:()=>toggleEx(cfgSess,ex.id),style:{display:'flex',alignItems:'center',gap:'12px',padding:'11px 0',borderBottom:'1px solid rgba(0,0,0,0.05)',cursor:'pointer'}},
          h('div',{style:{width:'24px',height:'24px',borderRadius:'6px',border:'2px solid',borderColor:assigned?G:'rgba(0,0,0,0.15)',background:assigned?G:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},assigned&&h('span',{style:{color:'#fff',fontSize:'15px',fontWeight:'900'}},'✓')),
          h('div',null,h('div',{style:{fontSize:'14px',fontWeight:'600',color:'#111'}},ex.n),h('div',{style:{fontSize:'11px',color:'#999',marginTop:'1px'}},ex.m+' · '+ex.low+'–'+ex.hi+' reps · '+ex.kg+' kg'))
        );
      })
    )
  );

  return h('div',null,
    h('div',{style:card},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},
        h('div',{style:lbl},'Sesión de hoy'),
        h('button',{onClick:()=>setConfiguring(true),style:{background:'none',border:'1px solid rgba(0,0,0,0.12)',borderRadius:'6px',padding:'5px 10px',fontSize:'11px',cursor:'pointer',color:'#666'}},'⚙️ Configurar')
      ),
      h('div',{style:{display:'flex',gap:'6px'}},SESS.map(s=>h('button',{key:s,onClick:()=>setActiveSess(s),style:{flex:1,padding:'10px 4px',fontSize:'14px',cursor:'pointer',border:'2px solid',borderRadius:'8px',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',fontWeight:activeSess===s?'800':'400',color:activeSess===s?'#111':'#999',background:activeSess===s?'#F0F0F0':'#fff',borderColor:activeSess===s?'rgba(0,0,0,0.2)':'rgba(0,0,0,0.08)'}},
        h('span',{style:{fontSize:'18px',fontWeight:'900'}},s),
        h('span',{style:{fontSize:'9px',color:'#999'}},(cfg.assign[s]||[]).length+' ej.')
      )))
    ),
    sessExes.length===0
      ? h('div',{style:{...card,textAlign:'center',padding:'30px 20px'}},h('div',{style:{fontSize:'30px',marginBottom:'10px'}},'📋'),h('div',{style:{fontSize:'14px',color:'#999',fontWeight:'600'}},'Esta sesión no tiene ejercicios asignados'),h('button',{onClick:()=>setConfiguring(true),style:{marginTop:'12px',background:'#111',color:'#fff',border:'none',borderRadius:'8px',padding:'10px 20px',fontSize:'13px',cursor:'pointer',fontWeight:'600'}},'⚙️ Configurar sesión'))
      : sessExes.map(ex=>{
          const nk=nKg(ex);const to=tut===ex.id;const editing=editKg===ex.id;
          return h('div',{key:ex.id+'-'+activeSess,style:card},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}},
              h('div',null,
                h('div',{style:{fontWeight:'700',fontSize:'15px'}},ex.n),
                h('div',{style:{display:'flex',gap:'6px',marginTop:'6px',alignItems:'center'}},
                  h('span',{style:{fontSize:'11px',background:'#EBF4FF',color:B,padding:'2px 8px',borderRadius:'20px',fontWeight:'600'}},ex.m),
                  ex.url&&h('button',{onClick:()=>setTut(to?null:ex.id),style:{background:'none',border:'none',cursor:'pointer',fontSize:'11px',color:'#999',textDecoration:'underline'}},to?'Cerrar':'Tutorial')
                ),
                prevE1RM(ex)&&h('div',{style:{marginTop:'5px',fontSize:'11px',color:G,fontWeight:'600'}},
                  'Sem. ant.: '+prevE1RM(ex)+' kg e1RM'
                )
              ),

            const nombres=String(fila['Sesion'+s]||'').split(',').map(n=>n.trim()).filter(Boolean);

          });

          const MNAMES={desayuno:'Desayuno',almuerzo:'Almuerzo',merienda:'Merienda',cena:'Cena',postentreno:'Post-Entreno'};
          const MORDER=['desayuno','almuerzo','merienda','cena','postentreno'];
          const map={};
          rows.forEach(row=>{
            const raw=String(row.Comida||row.comida||'').trim();
            const ck=raw.toLowerCase().replace(/\s+/g,'').replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i').replace(/[óòö]/g,'o').replace(/[úùü]/g,'u').replace(/-/g,'');
            const opId=String(row.Opcion||row['Opción']||'A').toUpperCase().trim();

            let op=map[ck].ops.find(o=>o.id===opId);

            op.items.push({cat,n:alimento,gB,vB,vU});
          });
          Object.values(map).forEach(m=>m.ops.sort((a,b)=>a.id.localeCompare(b.id)));
          const ordered=[...MORDER.filter(k=>map[k]),...Object.keys(map).filter(k=>!MORDER.includes(k))].map(k=>map[k]);
          localStorage.setItem(`ase_${user}_menus`,JSON.stringify(ordered));

  },[user,exesReady]);

  const login=name=>{localStorage.setItem(USER_KEY,name);setUser(name);};
  const logout=()=>{if(confirm('¿Cambiar nombre?')){localStorage.removeItem(USER_KEY);setUser(null);}};

  function load(id){
    try{const r=localStorage.getItem(SK(id,user));if(r){const d=JSON.parse(r);setNut(d.n||iN());setHab(d.h||iH());if(d.sr)setSessionReps(d.sr);else setSessionReps({});setSaved(true);}else{setNut(iN());setHab(iH());setSessionReps({});setSaved(false);}}catch(e){setNut(iN());setHab(iH());setSessionReps({});setSaved(false);}
    loadH();
  }
  function loadH(){
    try{const list=JSON.parse(localStorage.getItem(HK(user))||'[]');const w=list.map(id=>{try{return JSON.parse(localStorage.getItem(SK(id,user)));}catch(e){return null;}}).filter(Boolean).sort((a,b)=>(a.wi||'').localeCompare(b.wi||''));setHist(w);}catch(e){setHist([]);}
  }
  function save(){
    setSaving(true);
    try{
      // Auto-actualizar kg cuando se alcanzó el techo de reps
      const curSR=sessionRepsRef.current;
      const newSK={...sessionKg};
      Object.entries(curSR).forEach(([sessId,sessData])=>{
        Object.entries(sessData).forEach(([exId,reps])=>{
          const ex=exes.find(e=>e.id===parseInt(exId));if(!ex)return;
          const curKg=(sessionKg[sessId]?.[exId])||ex.kg;
          const bestReps=Math.max(parseInt(reps.r1)||0,parseInt(reps.r2)||0);
          if(bestReps>=ex.hi){
            if(!newSK[sessId])newSK[sessId]={};
            newSK[sessId][exId]=rKg(curKg*1.05);
          }
        });
      });
      setSessionKg(newSK);
      localStorage.setItem(`ase_${user}_sessKg`,JSON.stringify(newSK));
      const d={wi:wk.id,wl:wk.label,n:nut,h:hab,sr:curSR,sk:newSK,e:exes,pp,pc,pC,pS,neat:hab.neat,toxics:toxC,sens:hab.sens||{}};
      localStorage.setItem(SK(wk.id,user),JSON.stringify(d));
      const list=JSON.parse(localStorage.getItem(HK(user))||'[]');
      if(!list.includes(wk.id)){list.push(wk.id);localStorage.setItem(HK(user),JSON.stringify(list));}
      setSaved(true);loadH();
      // Leer desde localStorage (garantizado tener los datos correctos)
      const e1rmSnap={};
      try{
        const savedD=JSON.parse(localStorage.getItem(SK(wk.id,user))||'{}');
        const sr=savedD.sr||{};
        const sk=savedD.sk||{};
        const exArr=savedD.e||exes;
        Object.entries(sr).forEach(([sessId,sessData])=>{
          Object.entries(sessData).forEach(([exId,reps])=>{
            const ex=exArr.find(e=>String(e.id)===String(exId)||e.id===parseInt(exId));
            if(!ex)return;
            const curKg=(sk[sessId]?.[exId])||(sk[sessId]?.[parseInt(exId)])||ex.kg;
            const bestReps=Math.max(parseInt(reps.r1)||0,parseInt(reps.r2)||0);
            if(bestReps>0)e1rmSnap[ex.n+'_'+sessId]=calcE1RM(curKg,bestReps);
          });
        });
      }catch(err){}
      fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        user,wl:wk.label,wi:wk.id,pp,pc,pC,pS,sC,
        neat:hab.neat,toxics:toxC,
        sens:hab.sens||{},
        e1rm:e1rmSnap
      })}).catch(()=>{});
    }catch(e){}
    setSaving(false);
  }
  function newWeek(){
    if(!saved)save();
    const nextNum=(parseInt(localStorage.getItem(`ase_${user}_wknum`))||1)+1;
    localStorage.setItem(`ase_${user}_wknum`,String(nextNum));
    setWk(getWkForNum(user,nextNum));
    setNut(iN());setHab(iH());setSessionReps({});setSaved(false);
  }
  function upN(i,f,d){const n=[...nut];n[i]={...n[i],[f]:Math.max(0,Math.min(4,n[i][f]+d))};setNut(n);setSaved(false);}

  // Chart data
  const hPW=hist.filter(w=>w.pp&&w.pp!=='—');
  const hP=hPW.map(w=>parseFloat(w.pp));
  const hC2=hist.filter(w=>w.pc&&w.pc!=='—').map(w=>parseFloat(w.pc));
  const hL=hPW.map(w=>w.wi?.slice(5)||'');
  const useDemo=hP.length<2;
  const DEMO_P=[82.5,82.1,81.6,81.2,80.7,80.3,80.0],DEMO_C=[91.0,90.5,90.0,89.5,89.1,88.7,88.3],DEMO_L=['S1','S2','S3','S4','S5','S6','S7'];
  const cP=useDemo?DEMO_P:hP,cC=useDemo?DEMO_C:hC2,cL=useDemo?DEMO_L:hL;

  // e1RM exercise options (detect repeated exercises across sessions)
  const exOptions=useMemo(()=>{
    const opts=[];
    const nameCount={};
    Object.entries(cfg.assign||{}).forEach(([s,ids])=>(ids||[]).forEach(id=>{
      const ex=exes.find(e=>e.id===id);if(ex){nameCount[ex.n]=(nameCount[ex.n]||0)+1;}
    }));
    Object.entries(cfg.assign||{}).forEach(([s,ids])=>(ids||[]).forEach(id=>{
      const ex=exes.find(e=>e.id===id);
      if(ex)opts.push({exId:id,sessId:s,label:nameCount[ex.n]>1?`${ex.n} (Ses. ${s})`:ex.n});
    }));
    return opts;
  },[cfg,exes]);

  const e1rmHistory=useMemo(()=>{
    const opt=exOptions[selExOpt];if(!opt)return[];
    return hist.map(w=>{
      const exData=w.e?.find(e=>e.id===opt.exId);
      const reps=w.sr?.[opt.sessId]?.[opt.exId];
      const kg=(w.sk?.[opt.sessId]?.[opt.exId])||exData?.kg;
      if(!kg||!reps)return null;
      const bestReps=Math.max(parseInt(reps.r1)||0,parseInt(reps.r2)||0);
      if(bestReps===0)return null;
      return calcE1RM(kg,bestReps);
    }).filter(v=>v!==null);
  },[hist,exOptions,selExOpt]);

  // Sleep vs toxics data
  const svtData=hist.map(w=>({
    label:w.wi?.slice(5)||'',
    sleep:(w.h?.sleep||[]).filter(Boolean).length,
    toxics:w.toxics||0
  }));

  const TABS=[{id:'d',l:'Inicio',ic:'🏠'},{id:'t',l:'Entreno',ic:'🏋️'},{id:'die',l:'Dieta',ic:'🍽️'},{id:'n',l:'Registro',ic:'✅'},{id:'hb',l:'Hábitos',ic:'😴'}];

  function Dashboard(){
    return h('div',null,
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}},
        [{l:'Peso promedio',v:pp,u:'kg',k:'pp',c:G},{l:'Cintura promedio',v:pc,u:'cm',k:'pc',c:B}].map((m,i)=>{
          const prev=hist.length>1?hist[hist.length-2]:null;
          const diff=prev&&prev[m.k]&&m.v!=='—'?(parseFloat(m.v)-parseFloat(prev[m.k])).toFixed(1):null;
          return h('div',{key:i,style:{...card,marginBottom:0}},
            h('div',{style:lbl},m.l),h('div',{style:{fontSize:'24px',fontWeight:'800'}},m.v,' ',h('span',{style:{fontSize:'13px',color:'#999'}},m.u)),
            diff?h('div',{style:{fontSize:'12px',color:parseFloat(diff)<0?G:O,marginTop:'4px'}},(parseFloat(diff)<0?'↓':'↑')+' '+Math.abs(diff)+' vs sem. ant.'):null
          );
        })
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px',marginBottom:'10px'}},
        [{l:'Registro',v:pC+'%',c:G},{l:'Sueño',v:sC+'d',c:B},{l:'Tóxicos',v:toxC+'d',c:R},{l:'NEAT',v:hab.neat+'d',c:O}].map((m,i)=>
          h('div',{key:i,style:{background:'#F8F8F8',borderRadius:'8px',padding:'10px 4px',textAlign:'center'}},h('div',{style:{fontSize:'18px',fontWeight:'800',color:m.c}},m.v),h('div',{style:{fontSize:'10px',color:'#999',marginTop:'2px'}},m.l))
        )
      ),
      // Sensaciones resumen
      hab.sens&&Object.values(hab.sens).some(v=>v)&&h('div',{style:{...card,marginBottom:'10px'}},
        h('div',{style:{...lbl,marginBottom:'8px'}},'Sensaciones esta semana'),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}},
          Object.entries(SENS).map(([key,cfg2])=>{
            const val=(hab.sens||{})[key];if(!val)return null;
            const idx=cfg2.opts.indexOf(val);
            return h('div',{key,style:{background:'#F8F8F8',borderRadius:'8px',padding:'8px 10px'}},
              h('div',{style:{fontSize:'10px',color:'#999',fontWeight:'600'}},cfg2.l),
              h('div',{style:{fontSize:'12px',fontWeight:'700',color:idx>=0?cfg2.colors[idx]:'#111',marginTop:'2px'}},val)
            );
          })
        )
      ),
      h('div',{style:card},
        h('div',{style:{...lbl,marginBottom:'10px'}},'Tendencia — peso y cintura',useDemo?' (datos de ejemplo)':''),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}},
          h('div',null,h('div',{style:{fontSize:'11px',color:G,fontWeight:'700',marginBottom:'4px'}},'Peso (kg)'),h(LineChart,{data:cP,color:G,h:120,labels:cL})),
          h('div',null,h('div',{style:{fontSize:'11px',color:B,fontWeight:'700',marginBottom:'4px'}},'Cintura (cm)'),h(LineChart,{data:cC,color:B,h:120,labels:cL}))
        )
      ),
      svtData.length>0&&h('div',{style:card},
        h('div',{style:{...lbl,marginBottom:'4px'}},'Sueño vs Tóxicos — sem. a sem.'),
        h('div',{style:{display:'flex',gap:'12px',marginBottom:'8px'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},h('div',{style:{width:'10px',height:'10px',background:G,borderRadius:'2px'}}),h('span',{style:{fontSize:'10px',color:'#666'}},'Noches ≥7hs')),
          h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},h('div',{style:{width:'10px',height:'10px',background:R,borderRadius:'2px'}}),h('span',{style:{fontSize:'10px',color:'#666'}},'Días con tóxicos'))
        ),
        h(DualBarChart,{data:svtData})
      ),
      h('div',{style:card},
        h('div',{style:{...lbl,marginBottom:'8px'}},'e1RM por ejercicio',exOptions.length===0?' (configura sesiones primero)':''),
        exOptions.length>0&&h('div',null,
          h('select',{value:selExOpt,onChange:e=>setSelExOpt(parseInt(e.target.value)),style:{...inp,marginBottom:'10px',fontSize:'13px'}},exOptions.map((o,i)=>h('option',{key:i,value:i},o.label))),
          e1rmHistory.length>=2
            ?h('div',null,h(LineChart,{data:e1rmHistory,color:G,h:120,labels:hist.map(w=>w.wi?.slice(5)||'')}),h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:'6px',fontSize:'12px'}},h('span',{style:{color:'#666'}},'Inicio: '+e1rmHistory[0]+' kg'),h('span',{style:{color:G,fontWeight:'700'}},'Actual: '+e1rmHistory[e1rmHistory.length-1]+' kg')))
            :h('div',{style:{textAlign:'center',padding:'16px',color:'#bbb',fontSize:'13px'}},'Guardá al menos 2 semanas para ver la progresión')
        )
      ),
      hist.length>0&&h('div',{style:card},
        h('div',{style:lbl},'Semanas guardadas'),
        hist.slice().reverse().map((w,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:i<hist.length-1?'1px solid rgba(0,0,0,0.06)':'none',fontSize:'13px'}},
          h('span',{style:{color:'#666'}},w.wl||w.wi),
          h('div',{style:{display:'flex',gap:'8px'}},w.pp&&w.pp!=='—'&&h('span',{style:{color:G,fontWeight:'700'}},w.pp+' kg'),w.pc&&w.pc!=='—'&&h('span',{style:{color:B,fontWeight:'700'}},w.pc+' cm'))
        ))
      )
    );
  }

  if(!user)return h(Login,{onLogin:login});
  return h('div',{style:{maxWidth:'480px',margin:'0 auto',background:'#F5F5F5',minHeight:'100vh'}},
    h('div',{style:{background:'#fff',borderBottom:'1px solid rgba(0,0,0,0.09)',padding:'14px 18px',position:'sticky',top:0,zIndex:10,display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',null,
        h('div',{style:{fontSize:'10px',color:'#999',fontWeight:'600',letterSpacing:'0.08em',textTransform:'uppercase'}},'Asesoría Personalizada'),
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},h('div',{style:{fontSize:'17px',fontWeight:'800'}},user),h('button',{onClick:logout,style:{background:'none',border:'none',cursor:'pointer',fontSize:'10px',color:'#ddd',padding:0}},'cambiar')),
        h('div',{style:{fontSize:'11px',color:'#999',marginTop:'1px'}},wk.label)
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'5px',alignItems:'flex-end'}},
        h('button',{onClick:save,disabled:saving||saved,style:{border:saved?'1px solid #A3DFC8':'none',borderRadius:'8px',padding:'8px 14px',fontSize:'12px',fontWeight:'700',cursor:saved?'default':'pointer',background:saved?'#EAF7F2':'#111',color:saved?G:'#fff'}},saving?'Guardando...':saved?'✓ Guardado':'Guardar semana'),
        h('button',{onClick:newWeek,style:{background:'none',border:'none',cursor:'pointer',fontSize:'11px',color:'#999',padding:0}},'Nueva semana →')
      )
    ),
    h('div',{style:{padding:'14px',paddingBottom:'80px'}},
      tab==='d'&&h(Dashboard,null),
      tab==='t'&&h(Training,{key:'training',exes,setExes,setSaved,user,cfg,setCfg,sessionReps,setSessionReps,sessionKg,setSessionKg,hist}),
      tab==='die'&&h(Diet,{key:'diet',hab,user,menusVer}),
      tab==='n'&&h(Registro,{key:'registro',nut,upN,tC,tA,pC,pA}),
      tab==='hb'&&h(Habitos,{key:'habitos',hab,setHab,setSaved,pp,pc,sC})
    ),
    h('div',{style:{background:'#fff',borderTop:'1px solid rgba(0,0,0,0.08)',display:'flex',position:'sticky',bottom:0,zIndex:10}},
      TABS.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:'10px 2px 14px',fontSize:'10px',background:'none',border:'none',borderTop:tab===t.id?'2px solid #111':'2px solid transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',color:tab===t.id?'#111':'#999',fontWeight:tab===t.id?'700':'400'}},h('span',{style:{fontSize:'17px'}},t.ic),t.l))
    )
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
