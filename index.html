function toFrac(n){if(n<=0)return'0';const w=Math.floor(n),d=n-w;const fs=[[0,''],[0.25,'¼'],[0.333,'⅓'],[0.5,'½'],[0.667,'⅔'],[0.75,'¾']];let best=fs[0];fs.forEach(f=>{if(Math.abs(d-f[0])<Math.abs(d-best[0]))best=f;});if(Math.abs(d-1)<Math.abs(d-best[0]))return String(w+1);return(w>0?String(w):'')+best[1]||'0';}
function calcP(item,tmpl){if(item.fx)return{v:item.vB+' '+item.vU,g:null};const f=tmpl/BASE_T;return{v:toFrac(item.vB*f)+' '+item.vU,g:Math.round(item.gB*f)+'g'};}

// Construye la base de alimentos desde la hoja Menus
function buildFoodDB(rows){
  const db={};
  (rows||[]).forEach(row=>{
    const clave=String(row.Clave||row.clave||'').trim().toLowerCase();
    if(!clave)return;
    db[clave]={
      cat:String(row.Categoria||row.categoria||'P').toUpperCase().trim(),
      n:String(row.Nombre||row.nombre||clave),
      gB:parseFloat(row.Gramos2000||row.gramos2000)||0,
      vU:String(row.UnidadVisual||row.unidadvisual||'').trim(),
      vB:parseFloat(row.CantVisual||row.cantvisual)||1,
    };
  });
  return db;
}

// Construye el array de comidas desde la fila de Dietas + food DB
function parseDietas(row,foodDB){
  const MEALS=[
    {id:'desayuno',nom:'Desayuno',ic:'☀️',cols:['DesayunoA','DesayunoB','DesayunoC']},
    {id:'almuerzo',nom:'Almuerzo',ic:'🌞',cols:['AlmuerzoA','AlmuerzoB','AlmuerzoC']},
    {id:'merienda',nom:'Merienda',ic:'☕',cols:['MeriendaA','MeriendaB','MeriendaC']},
    {id:'cena',nom:'Cena',ic:'🌙',cols:['CenaA','CenaB','CenaC']},
    {id:'postentreno',nom:'Post-Entreno',ic:'💪',cols:['PostEntrenoA','PostEntrenoB','PostEntrenoC']},
  ];
  const OPT=['A','B','C'];
  return MEALS.map(meal=>{
    const ops=meal.cols.map((col,i)=>{
      const val=String(row[col]||'').trim();if(!val)return null;
      const items=val.split(',').map(k=>k.trim().toLowerCase()).filter(Boolean).map(k=>{
        const food=foodDB[k];if(!food)return null;
        return{...food,key:k};
      }).filter(Boolean);
      if(!items.length)return null;
      return{id:OPT[i],nom:'Opción '+OPT[i],items};
    }).filter(Boolean);
    if(!ops.length)return null;
    return{...meal,ops};
  }).filter(Boolean);
}

// Semana secuencial basada en contador localStorage — Lun a Dom
function getWkForNum(user,num){
  const startId=localStorage.getItem(`ase_${user}_startdate`)||new Date().toISOString().split('T')[0];
  let startMon=new Date(startId+'T12:00:00');
  if(isNaN(startMon.getTime())){const t=new Date();t.setHours(12,0,0,0);startMon=t;}
  const day=startMon.getDay();
  const diffToMon=day===0?-6:1-day;
  startMon.setDate(startMon.getDate()+diffToMon);
  const wkMon=new Date(startMon);wkMon.setDate(startMon.getDate()+(num-1)*7);
  const wkSun=new Date(wkMon);wkSun.setDate(wkMon.getDate()+6);
  const fmtDay=d=>d.toLocaleDateString('es-AR',{day:'numeric'});
  const fmtMes=d=>d.toLocaleDateString('es-AR',{month:'short'}).replace('.','');
  const label=`Sem ${num} · ${fmtDay(wkMon)}-${fmtDay(wkSun)} ${fmtMes(wkSun).charAt(0).toUpperCase()+fmtMes(wkSun).slice(1)}`;
  return{id:`sem_${num}`,num,label};
}

// ── CHARTS ────────────────────────────────────────────────────────────
function LineChart({data,color,h:ht=140,labels,pointLabels}){
  if(!data||data.length<2)return null;
  const W=300,H=ht,pad={t:pointLabels?22:10,b:24,l:pointLabels?10:32,r:10};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const mn=Math.min(...data)*0.97,mx=Math.max(...data)*1.03;
  const x=i=>pad.l+i/(data.length-1)*iW;
  const y=v=>pad.t+(1-(v-mn)/(mx-mn))*iH;
  const pts=data.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const poly=pts+` ${x(data.length-1)},${H-pad.b} ${x(0)},${H-pad.b}`;
  const step=Math.ceil(data.length/5);
  return h('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`,style:{display:'block',overflow:'visible'}},
    h('polygon',{points:poly,fill:color,opacity:'0.08'}),
    h('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:'2',strokeLinejoin:'round'}),
    data.map((v,i)=>(i%step===0||i===data.length-1)?h('circle',{key:i,cx:x(i),cy:y(v),r:'3',fill:color}):null),
    pointLabels&&pointLabels.map((pl,i)=>(i%step===0||i===data.length-1)?h('text',{key:'pl'+i,x:x(i),y:y(data[i])-8,textAnchor:'middle',fontSize:'9',fontWeight:'700',fill:color},pl):null),
    labels&&labels.map((l,i)=>(i%step===0||i===labels.length-1)?h('text',{key:i,x:x(i),y:H-6,textAnchor:'middle',fontSize:'9',fill:'#999'},l):null),
    !pointLabels&&h('text',{x:pad.l-2,y:y(mn)+4,textAnchor:'end',fontSize:'9',fill:'#999'},mn.toFixed(1)),
    !pointLabels&&h('text',{x:pad.l-2,y:y(mx)+4,textAnchor:'end',fontSize:'9',fill:'#999'},mx.toFixed(1))
  );
}
function DualBarChart({data,key2='toxics',color2=R}){
  if(!data||data.length<1)return null;
  const W=300,H=100,pad={t:8,b:22,l:20,r:8};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const bW=Math.min(10,iW/data.length/2-2);
  const gap=iW/data.length;
  const max2=Math.max(...data.map(d=>d[key2]||0),1);
  return h('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`,style:{display:'block'}},
    h('line',{x1:pad.l,y1:pad.t+iH,x2:W-pad.r,y2:pad.t+iH,stroke:'rgba(0,0,0,0.08)',strokeWidth:'1'}),
    data.map((d,i)=>{
      const cx=pad.l+i*gap+gap/2;
      const sH=(d.sleep/7)*iH;
      const v2=d[key2]||0;
      const tH=(v2/max2)*iH;
      return h('g',{key:i},
        h('rect',{x:cx-bW-1,y:pad.t+iH-sH,width:bW,height:Math.max(sH,1),fill:'#111',rx:'2'}),
        h('rect',{x:cx+1,y:pad.t+iH-tH,width:bW,height:Math.max(tH,1),fill:color2,rx:'2'}),
        h('text',{x:cx,y:H-6,textAnchor:'middle',fontSize:'8',fill:'#999'},d.label)
      );
    })
  );
}

function Training({exes,setExes,setSaved,user,cfg,setCfg,sessionReps,setSessionReps,sessionKg,setSessionKg,hist,wk,loadingExes}){
  const BLOQUES={
    volumen:    {label:'Volumen',     color:'#1D9E75',emoji:'📈',hint:'Triple progresión: más reps dentro del rango → más kg → más series cada 2 semanas.'},
    intensidad: {label:'Intensidad',  color:'#378ADD',emoji:'🏋️',hint:'Doble progresión: más reps → más kg al alcanzar el techo. Última serie con técnica de intensidad.'},
    man:        {label:'Mantenimiento',color:'#6B7280',emoji:'🔄',hint:'Doble progresión normal. Variables estables, sin cambios automáticos de series.'},
    base:       {label:'Progresión Base',color:'#F59E0B',emoji:'🌱',hint:'Si el entrenamiento anterior se sintió cómodo y controlado, hoy es momento de subir un poco el peso.'},
    deporte:    {label:'Deporte',     color:'#8B5CF6',emoji:'🏀',hint:'Velocidad máxima en cada rep. Terminá la serie cuando notes pérdida de velocidad.'},
    rehab:      {label:'Rehabilitación',color:'#EF4444',emoji:'🏥',hint:'Registrá los kg y reps de cada ejercicio. La progresión la indicará tu coach.'},
  };
  const bloque=(cfg?.bloque||'volumen').toLowerCase();
  const bloqueInfo=BLOQUES[bloque]||BLOQUES.volumen;
  const bloqueInicio=cfg?.bloqueInicio||1;
  const wkNum=wk?.num||1;
  const weeksInBlock=Math.max(0,wkNum-bloqueInicio);
  // volumen: triple progresión | intensidad: doble c/2sem | man: doble normal | deporte/rehab: sin progresión
  const hasProgression=bloque==='volumen'||bloque==='intensidad'||bloque==='man';
  const hasAutoSeries=bloque==='volumen'; // solo volumen sube series
  const seriesBase=Math.min(4,Math.max(2,cfg?.series||2));
  const defCfg={num:3,assign:{A:[],B:[],C:[],D:[]}};
  if(!cfg)cfg=defCfg;
  const [configuring,setConfiguring]=useState(false);
  const [activeSess,setActiveSess]=useState('A');
  const [tut,setTut]=useState(null);
  const [editKg,setEditKg]=useState(null);
  const [kgVal,setKgVal]=useState('');
  const [videos,setVideos]=useState(()=>{try{return JSON.parse(localStorage.getItem(`ase_${user}_videos`)||'{}')}catch(e){return{};}});
  const [uploading,setUploading]=useState({});
  const [showCamera,setShowCamera]=useState(null); // {sessId,exId}
  const fileRef=useRef(null);
  const uploadTarget=useRef(null);

  function getVideoKey(sessId,exId){return sessId+'_'+exId;}
  function getVideo(sessId,exId){return videos[getVideoKey(sessId,exId)];}
  function saveVideoUrl(sessId,exId,url){
    const nv={...videos,[getVideoKey(sessId,exId)]:url};
    setVideos(nv);localStorage.setItem(`ase_${user}_videos`,JSON.stringify(nv));
    // Notificar al panel del coach via Apps Script
    const exName=exes.find(e=>e.id===parseInt(exId))?.n||exId;
    fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'video',user,sessId,exId,exName,url,fecha:new Date().toISOString()})
    }).catch(()=>{});
  }
  async function uploadBlob(blob,sessId,exId){
    const key=getVideoKey(sessId,exId);
    setUploading(p=>({...p,[key]:true}));
    try{
      const fd=new FormData();
      fd.append('file',blob);
      fd.append('upload_preset',UPLOAD_PRESET);
      fd.append('public_id',`${user}_${key}_${Date.now()}`);
      const res=await fetch(CLOUD_URL,{method:'POST',body:fd});
      const data=await res.json();
      if(data.secure_url)saveVideoUrl(sessId,exId,data.secure_url);
    }catch(e){}
    setUploading(p=>({...p,[key]:false}));
  }
  function triggerGallery(sessId,exId){
    uploadTarget.current={sessId,exId};fileRef.current.click();
  }
  function onFileChange(e){
    const file=e.target.files[0];if(!file||!uploadTarget.current)return;
    const{sessId,exId}=uploadTarget.current;
    const mb=Math.round(file.size/1024/1024);
    if(file.size>80*1024*1024){
      if(!window.confirm(`El video pesa ${mb}MB y puede fallar al subir.\n¿Intentar igual? Si falla, usá "Grabar" desde la app.`)){e.target.value='';return;}
    }
    uploadBlob(file,sessId,exId);e.target.value='';
  }
  const [cfgSess,setCfgSess]=useState('A');
  const [openTec,setOpenTec]=useState(null);
  const SESS=['A','B','C','D'].slice(0,cfg.num);

  const saveCfg=nc=>{setCfg(nc);localStorage.setItem(CFG_KEY(user),JSON.stringify(nc));};

function CameraModal({onCapture,onClose}){
  const [recording,setRecording]=useState(false);
  const [countdown,setCountdown]=useState(120);
  const [mrState,setMrState]=useState(null);
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const mrRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  useEffect(()=>{
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:720}},audio:true})
      .then(stream=>{streamRef.current=stream;if(videoRef.current)videoRef.current.srcObject=stream;})
      .catch(()=>onClose());
    return()=>{
      if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
      if(timerRef.current)clearInterval(timerRef.current);
    };
  },[]);
  function startRec(){
    chunksRef.current=[];
    const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm';
    const mr=new MediaRecorder(streamRef.current,{mimeType:mime,videoBitsPerSecond:500000});
    mr.ondataavailable=e=>e.data.size>0&&chunksRef.current.push(e.data);
    mr.onstop=()=>{const blob=new Blob(chunksRef.current,{type:'video/webm'});onCapture(blob);};
    mrRef.current=mr;mr.start(1000);setRecording(true);setMrState('recording');
    let secs=0;setCountdown(120);
    timerRef.current=setInterval(()=>{secs++;setCountdown(120-secs);if(secs>=120)stopRec();},1000);
  }
  function stopRec(){

      h('button',{onClick:onClose,style:{position:'absolute',top:'16px',left:'16px',background:'rgba(255,255,255,0.15)',border:'none',color:'#fff',borderRadius:'8px',padding:'8px 12px',cursor:'pointer',fontSize:'13px'}},'✕ Cancelar'),
      !recording
        ?h('button',{onClick:startRec,style:{background:R,color:'#fff',border:'4px solid rgba(255,255,255,0.3)',borderRadius:'50%',width:'70px',height:'70px',fontSize:'28px',cursor:'pointer'}}, '⏺')
        :h('div',{style:{display:'flex',alignItems:'center',gap:'16px'}},
            h('div',{style:{color:'#fff',fontSize:'22px',fontWeight:'800',minWidth:'60px',textAlign:'center'}},countdown+'s'),
            h('button',{onClick:stopRec,style:{background:'#fff',color:'#111',border:'none',borderRadius:'50%',width:'70px',height:'70px',fontSize:'22px',cursor:'pointer',fontWeight:'800'}},'⏹')
          ),
      recording&&h('div',{style:{position:'absolute',top:'16px',right:'16px',display:'flex',alignItems:'center',gap:'6px'}},
        h('div',{style:{width:'8px',height:'8px',borderRadius:'50%',background:R,animation:'pulse 1s infinite'}}),
        h('span',{style:{color:'#fff',fontSize:'12px',fontWeight:'700'}})
      )
    )
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('d');
  const [selExOpt,setSelExOpt]=useState(0);
  const [wk,setWk]=useState({id:'sem_1',num:1,label:'...'});
  const [hiitData,setHiitData]=useState(iHiit());
  const HK2=u=>`ase_${u}_hiit`;
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [hist,setHist]=useState([]);
  const [nut,setNut]=useState(iN());
  const [exes,setExes]=useState(DEFAULT_EXES);
  const [hab,setHab]=useState(iH());
  const [sessionReps,setSessionReps]=useState({});
  const [sessionKg,setSessionKg]=useState({});
  const sessionRepsRef=useRef({});

  const [menusVer,setMenusVer]=useState(0);
  const defCfg={num:3,assign:{A:[],B:[],C:[],D:[]}};

  const [exesReady,setExesReady]=useState(false);

  const mP=hab.meds.filter(m=>m.p).map(m=>normNum(m.p));

  const mC=hab.meds.filter(m=>m.c).map(m=>normNum(m.c));
  const pc=mC.length?(mC.reduce((a,b)=>a+b,0)/mC.length).toFixed(1):'—';
  const pesoInicial=parseFloat(localStorage.getItem(`ase_${user}_pesoinicial`)||'0')||0;
  const nivel=parseInt(localStorage.getItem(`ase_${user}_nivel`)||'1')||1;
  const pesoRef=pesoInicial>0?pesoInicial:(mP.length?mP[0]:(hist.length>0?parseFloat(hist[hist.length-1].pp)||70:70));
  const metaAgua=(pesoRef*40/1000).toFixed(1);
  const metaSal=parseFloat(metaAgua).toFixed(1);
  const pesoVal=normNum(hab.meds.find(m=>m.p&&normNum(m.p)>0)?.p)||pesoRef;
  const tC=nut.reduce((a,d)=>a+Object.values(d.m||{}).filter(Boolean).length,0),pC=Math.round(tC/24*100);
  const aguaDias=nut.filter(d=>d.ak).length;
  const aguaPromedio=(nut.reduce((a,d)=>a+normNum(d.a),0)/6).toFixed(1);
  const tA=aguaDias,pA=Math.round(aguaDias/6*100);
  const sC=(hab.sleep||[]).filter(Boolean).length,pS=Math.round(sC/6*100);
  const actExtraC=(hab.actExtra||[]).filter(Boolean).length;
  const toxC=(hab.toxics||[]).filter(Boolean).length;

  useEffect(()=>{const s=localStorage.getItem(USER_KEY);if(s)setUser(s);},[]);

  // Efecto 1: cargar ejercicios
  useEffect(()=>{
    if(!user)return;
    const wkNum=parseInt(localStorage.getItem(`ase_${user}_wknum`))||1;
    setWk(getWkForNum(user,wkNum));
    // Restaurar borrador inmediatamente antes del fetch para no sobreescribir
    try{
      const wkId=`sem_${wkNum}`;
      const draftStr=localStorage.getItem(`ase_${user}_draft_${wkId}`);
      const savedStr=localStorage.getItem(SK(wkId,user));
      const d=draftStr?JSON.parse(draftStr):(savedStr?JSON.parse(savedStr):null);
      if(d){if(d.sr)setSessionReps(d.sr);if(d.n)setNut(migrateNut(d.n));if(d.h)setHab(migrateHab(d.h));if(d.hiit)setHiitData(d.hiit);setSaved(!!savedStr);}
    }catch(e){}
    setCfg(()=>{try{return JSON.parse(localStorage.getItem(CFG_KEY(user)))||defCfg;}catch(e){return defCfg;}});
    try{const sk=localStorage.getItem(`ase_${user}_sessKg`);if(sk)setSessionKg(JSON.parse(sk)||{});}catch(e){}
    setExesReady(false);setLoadingExes(true);
    fetch(SCRIPT_URL+'?action=ejercicios')
      .then(r=>r.json())
      .then(rows=>{
        if(rows&&rows.length>0){
          const exData=rows.map((r,i)=>{
            const savedKg=parseFloat(localStorage.getItem(KG_KEY(user,r.Nombre||r.NOMBRE||'')));
            const kg=isNaN(savedKg)?(parseFloat(r.KgInicial)||20):savedKg;
            return{id:i+1,n:String(r.Nombre||r.NOMBRE||r.nombre||''),m:String(r.Musculo||r.Músculo||r.MÚSCULO||''),
              low:parseInt(r.RepMin||r['Rep Min'])||8,hi:parseInt(r.RepMax||r['Rep Max'])||12,kg,url:String(r.Tutorial||r.TUTORIAL||''),r1:'',r2:''};
          });
          setExes(exData);exesRef.current=exData;
        }
      }).catch(()=>{}).finally(()=>{setLoadingExes(false);setExesReady(true);draftReady.current=true;load(`sem_${wkNum}`);});
  },[user]);

  // Efecto 2: cargar rutinas y menús después de ejercicios
  useEffect(()=>{
    if(!user||!exesReady)return;
    // Rutinas → sesiones y ejercicios
    fetch(SCRIPT_URL+'?action=rutinas')
      .then(r=>r.json())
      .then(rutinas=>{
        const fila=rutinas.find(r=>String(r.Asesorado||'').trim().toLowerCase()===user.trim().toLowerCase());
        if(fila){
          const num=parseInt(fila.NumSesiones)||3;
          const assign={};
          const norm2=n=>n.trim().toLowerCase().replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i').replace(/[óòö]/g,'o').replace(/[úùü]/g,'u').replace(/ñ/g,'n');
          ['A','B','C','D'].slice(0,num).forEach(s=>{
            const nombres=String(fila['Sesion'+s]||'').split(',').map(n=>n.trim()).filter(Boolean);
            assign[s]=nombres.map(nombre=>{
              if(nombre.includes('+')){
                // biserie o serie gigante: 2+ ejercicios separados por +
                return nombre.split('+').map(n=>{const ex=exesRef.current.find(e=>norm2(e.n)===norm2(n.trim()));return ex?ex.id:null;}).filter(Boolean);
              }
              const ex=exesRef.current.find(e=>norm2(e.n)===norm2(nombre.trim()));
              return ex?ex.id:null;
            }).filter(v=>v!==null);
          });
          const hiitSess=['A','B','C','D'].map(s=>{
            const nom=String(fila['HIIT'+s]||'').trim();
            if(!nom)return null;
            return{id:s,nom,detalle:String(fila['HIIT'+s+'Detalle']||'').trim(),ritmo:String(fila['HIIT'+s+'Ritmo']||'').trim()};
          }).filter(Boolean);
          const normBloque=s=>{
            const n=s.toLowerCase().trim().replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i').replace(/[óòö]/g,'o').replace(/[úùü]/g,'u').replace(/ñ/g,'n');
            const MAP={'mantenimiento':'man','mant':'man','manteniment':'man','deportivo':'deporte','rehabilitacion':'rehab','rehab':'rehab','progresion base':'base','progresionbase':'base','base':'base','intensidad':'intensidad','volumen':'volumen','deporte':'deporte','man':'man'};
            return MAP[n]||n;
          };
          const newCfg={num,assign,series:Math.min(4,Math.max(2,parseInt(fila.Series)||2)),bloque:normBloque(String(fila.Bloque||'volumen')),bloqueInicio:parseInt(fila.BloqueInicio)||1,hiit:hiitSess};setCfg(newCfg);localStorage.setItem(CFG_KEY(user),JSON.stringify(newCfg));
          // FechaInicio: fecha de arranque para calcular semanas (lunes de esa semana)
          const fechaInicio=String(fila.FechaInicio||'').trim();
          if(fechaInicio){localStorage.setItem(`ase_${user}_startdate`,fechaInicio);}
          else if(!localStorage.getItem(`ase_${user}_startdate`)){localStorage.setItem(`ase_${user}_startdate`,new Date().toISOString().split('T')[0]);}
          const tmpl=parseInt(fila.Template);
          if(!isNaN(tmpl)&&TEMPLATES.includes(tmpl))localStorage.setItem(`ase_${user}_tmpl`,String(tmpl));
        }
      }).catch(()=>{});
    // Alimentos (hoja Menus) + Dietas en paralelo → construye la dieta del asesorado
    Promise.all([
      fetch(SCRIPT_URL+'?action=menus').then(r=>r.json()).catch(()=>[]),
      fetch(SCRIPT_URL+'?action=dietas').then(r=>r.json()).catch(()=>[])
    ]).then(([menusRows,dietasRows])=>{
      const foodDB=buildFoodDB(menusRows||[]);
      const dietaFila=(dietasRows||[]).find(r=>String(r.Asesorado||'').trim().toLowerCase()===user.trim().toLowerCase());
      if(dietaFila){
        const tmpl=parseInt(dietaFila.Template);
        if(!isNaN(tmpl)&&TEMPLATES.includes(tmpl))localStorage.setItem(`ase_${user}_tmpl`,String(tmpl));
        const pi=parseFloat(String(dietaFila.PesoInicial||'').replace(',','.'));
        if(!isNaN(pi)&&pi>0)localStorage.setItem(`ase_${user}_pesoinicial`,String(pi));
        const niv=parseInt(dietaFila.Nivel||'1');
        if(niv>=1&&niv<=3)localStorage.setItem(`ase_${user}_nivel`,String(niv));
        const comidas=parseDietas(dietaFila,foodDB);
        if(comidas.length>0){
          localStorage.setItem(`ase_${user}_menus`,JSON.stringify(comidas));
          setMenusVer(v=>v+1);
        }
      }
    }).catch(()=>{});
  },[user,exesReady]);

  const login=name=>{localStorage.setItem(USER_KEY,name);setUser(name);};
  const logout=()=>{if(confirm('¿Cambiar nombre?')){localStorage.removeItem(USER_KEY);setUser(null);}};

  function load(id){
    try{
      const draft=localStorage.getItem(`ase_${user}_draft_${id}`);
      const saved=localStorage.getItem(SK(id,user));
      const d=draft?JSON.parse(draft):(saved?JSON.parse(saved):null);
      if(d){setNut(migrateNut(d.n));setHab(migrateHab(d.h));if(d.hiit)setHiitData(d.hiit);else setHiitData(iHiit());if(d.sr)setSessionReps(d.sr);else setSessionReps({});setSaved(!!saved);}
      else{setNut(iN());setHab(iH());setSessionReps({});setSaved(false);}
    }catch(e){setNut(iN());setHab(iH());setSessionReps({});setSaved(false);}
    loadH();
  }
  function loadH(){
    try{const list=JSON.parse(localStorage.getItem(HK(user))||'[]');const w=list.map(id=>{try{return JSON.parse(localStorage.getItem(SK(id,user)));}catch(e){return null;}}).filter(Boolean).sort((a,b)=>(a.wi||'').localeCompare(b.wi||''));setHist(w);}catch(e){setHist([]);}
  }
  function doSave(completeWeek){
    setSaving(true);
    try{
      const curSR=sessionRepsRef.current;
      const bloqueActual=(cfg?.bloque||'volumen').toLowerCase();
      const hasProgressionSave=bloqueActual==='volumen'||bloqueActual==='intensidad'||bloqueActual==='man';
      const newSK={...sessionKg};
      Object.entries(curSR).forEach(([sessId,sessData])=>{
        Object.entries(sessData).forEach(([exId,reps])=>{
          const ex=exes.find(e=>e.id===parseInt(exId));if(!ex)return;
          const curKg=(sessionKg[sessId]?.[exId])||ex.kg;
          if(!hasProgressionSave)return;
          const r1=parseInt(reps.r1)||0;
          if(r1<ex.hi)return;
          // volumen, intensidad y man: sube al alcanzar techo inmediatamente
          if(!newSK[sessId])newSK[sessId]={};
          newSK[sessId][exId]=rKg(curKg*1.05);
        });
      });
      setSessionKg(newSK);
      localStorage.setItem(`ase_${user}_sessKg`,JSON.stringify(newSK));
      const d={wi:wk.id,wl:wk.label,n:nut,h:hab,sr:curSR,sk:newSK,e:exes,pp,pc,pC,pS,actExtra:actExtraC,toxics:toxC,sens:hab.sens||{},aguaDias,aguaPromedio,hiit:hiitData};
      localStorage.setItem(SK(wk.id,user),JSON.stringify(d));
      const list=JSON.parse(localStorage.getItem(HK(user))||'[]');
      if(!list.includes(wk.id)){list.push(wk.id);localStorage.setItem(HK(user),JSON.stringify(list));}
      setSaved(completeWeek?true:'progreso');loadH();
      const e1rmSnap={};
      try{
        const savedD=JSON.parse(localStorage.getItem(SK(wk.id,user))||'{}');
        const sr=savedD.sr||{};const sk=savedD.sk||{};const exArr=savedD.e||exes;
        Object.entries(sr).forEach(([sessId,sessData])=>{
          Object.entries(sessData).forEach(([exId,reps])=>{
            const ex=exArr.find(e=>String(e.id)===String(exId)||e.id===parseInt(exId));if(!ex)return;
            const curKg=(sk[sessId]?.[exId])||(sk[sessId]?.[parseInt(exId)])||ex.kg;
            const r1=parseInt(reps.r1)||0;
            if(r1>0)e1rmSnap[ex.n+'_'+sessId]=calcE1RM(curKg,r1);
          });
        });
      }catch(err){}
      fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        user,wl:wk.label,wi:wk.id,pp,pc,pC,pS,sC,
        neat:actExtraC,toxics:toxC,
        sens:hab.sens||{},
        e1rm:e1rmSnap
      })}).catch(()=>{});
    }catch(e){}
    setSaving(false);

  function save(){doSave(true);}
  function saveProgress(){doSave(false);}

    localStorage.removeItem(`ase_${user}_draft_${wk.id}`);

  // Auto-guardar borrador en localStorage ante cualquier cambio
  useEffect(()=>{

  // Chart data

  const hP=hPW.map(w=>parseFloat(w.pp));
  const hC2=hist.filter(w=>w.pc&&w.pc!=='—').map(w=>parseFloat(w.pc));

          const color=m.k==='pp'?G:B;
          return h('div',{key:i,style:{...card,marginBottom:0}},
            h('div',{style:lbl},m.l),h('div',{style:{fontSize:'24px',fontWeight:'800'}},lastV,' ',h('span',{style:{fontSize:'13px',color:'#999'}},m.u)),
            diff?h('div',{style:{fontSize:'12px',color:parseFloat(diff)<0?G:O,marginTop:'4px'}},(parseFloat(diff)<0?'↓':'↑')+' '+Math.abs(diff)+' vs sem. ant.'):null
          );
        })
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px',marginBottom:'10px'}},
        [{l:'Registro',v:pC+'%',c:G},{l:'Sueño',v:sC+'d',c:B},{l:'Tóxicos',v:toxC+'d',c:R},{l:'Act. Extra',v:actExtraC+'d',c:O}].map((m,i)=>
          h('div',{key:i,style:{background:'#F8F8F8',borderRadius:'8px',padding:'10px 4px',textAlign:'center'}},h('div',{style:{fontSize:'18px',fontWeight:'800',color:m.c}},m.v),h('div',{style:{fontSize:'10px',color:'#999',marginTop:'2px'}},m.l))
        )
      ),

      h('div',{style:card},
        h('div',{style:{...lbl,marginBottom:'10px'}},'Tendencia — peso y cintura',useDemo?' (datos de ejemplo)':''),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}},
          h('div',null,h('div',{style:{fontSize:'11px',color:G,fontWeight:'700',marginBottom:'4px'}},'Peso (kg)'),h(LineChart,{data:cP,color:G,h:120,labels:cL})),
          h('div',null,h('div',{style:{fontSize:'11px',color:B,fontWeight:'700',marginBottom:'4px'}},'Cintura (cm)'),h(LineChart,{data:cC,color:B,h:120,labels:cL}))
        )
      ),
      svtData.length>0&&h('div',{style:card},
        h('div',{style:{...lbl,marginBottom:'4px'}},'Sueño vs Energía — sem. a sem.'),
        h('div',{style:{display:'flex',gap:'12px',marginBottom:'8px'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},h('div',{style:{width:'10px',height:'10px',background:'#111',borderRadius:'2px'}}),h('span',{style:{fontSize:'10px',color:'#666'}},'Noches ≥7hs')),
          h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},h('div',{style:{width:'10px',height:'10px',background:O,borderRadius:'2px'}}),h('span',{style:{fontSize:'10px',color:'#666'}},'Energía (1-3)'))
        ),
        h(DualBarChart,{data:svtData,key2:'energia',color2:O})
      ),
      h('div',{style:card},
        h('div',{style:{...lbl,marginBottom:'8px'}},'e1RM por ejercicio',exOptions.length===0?' (configura sesiones primero)':''),
        exOptions.length>0&&h('div',null,
          h('select',{value:selExOpt,onChange:e=>setSelExOpt(parseInt(e.target.value)),style:{...inp,marginBottom:'10px',fontSize:'13px'}},exOptions.map((o,i)=>h('option',{key:i,value:i},o.label))),
          e1rmHistory.length>=2
            ?h('div',null,
                h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px',alignItems:'center'}},
                  h('div',{style:{flex:1,background:'#F8F8F8',borderRadius:'10px',padding:'12px',textAlign:'center'}},
                    h('div',{style:{fontSize:'10px',color:'#999',fontWeight:'700',letterSpacing:'0.06em',marginBottom:'4px'}},'INICIO'),
                    h('div',{style:{fontSize:'20px',fontWeight:'900'}},e1rmHistory[0].r1,'×'),
                    h('div',{style:{fontSize:'14px',color:'#666'}},e1rmHistory[0].kg+' kg')
                  ),
                  h('div',{style:{fontSize:'22px',color:'#ccc',fontWeight:'300'}},'→'),
                  h('div',{style:{flex:1,background:'#EAF7F2',border:'1px solid #A3DFC8',borderRadius:'10px',padding:'12px',textAlign:'center'}},
                    h('div',{style:{fontSize:'10px',color:G,fontWeight:'700',letterSpacing:'0.06em',marginBottom:'4px'}},'AHORA'),
                    h('div',{style:{fontSize:'20px',fontWeight:'900',color:G}},e1rmHistory[e1rmHistory.length-1].r1,'×'),
                    h('div',{style:{fontSize:'14px',color:G}},e1rmHistory[e1rmHistory.length-1].kg+' kg')
                  )
                ),
                h(LineChart,{data:e1rmHistory.map(v=>v.e1rm),color:G,h:110,labels:hist.map(w=>w.wi?.slice(5)||''),pointLabels:e1rmHistory.map(v=>v.r1+'×'+v.kg)})
              )
            :h('div',{style:{textAlign:'center',padding:'16px',color:'#bbb',fontSize:'13px'}},'Guardá al menos 2 semanas para ver la progresión')
        )
      ),
      hist.length>0&&h('div',{style:card},
        h('div',{style:lbl},'Semanas guardadas'),
        hist.slice().reverse().map((w,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:i<hist.length-1?'1px solid rgba(0,0,0,0.06)':'none',fontSize:'13px'}},
          h('span',{style:{color:'#666'}},w.wl||w.wi),
          h('div',{style:{display:'flex',gap:'8px'}},w.pp&&w.pp!=='—'&&h('span',{style:{color:G,fontWeight:'700'}},w.pp+' kg'),w.pc&&w.pc!=='—'&&h('span',{style:{color:B,fontWeight:'700'}},w.pc+' cm'))
        ))
      )
    );
  }

  const [showInstall,setShowInstall]=useState(()=>!window.navigator.standalone&&!window.matchMedia('(display-mode: standalone)').matches&&!localStorage.getItem('ft_install_shown'));
  function dismissInstall(){localStorage.setItem('ft_install_shown','1');setShowInstall(false);}

  const showAjustar=new URLSearchParams(window.location.search).get('ajustar')==='true';
  if(showAjustar)return h(AjustarSemana,{onClose:()=>window.location.href=window.location.pathname});
  if(!user)return h(Login,{onLogin:login});
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);

  return h('div',{style:{maxWidth:'480px',margin:'0 auto',background:'#F5F5F5',minHeight:'100vh'}},
    showInstall&&h('div',{style:{background:'#1D9E75',padding:'12px 16px',display:'flex',alignItems:'flex-start',gap:'10px',zIndex:20,position:'sticky',top:0}},
      h('span',{style:{fontSize:'20px',flexShrink:0}},'📱'),
      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:'13px',fontWeight:'700',color:'#fff',marginBottom:'3px'}},'Agregá esta app a tu pantalla de inicio'),
        h('div',{style:{fontSize:'11px',color:'rgba(255,255,255,0.85)',lineHeight:'1.4'}},
          isIOS?"Safari: icono compartir > Agregar a pantalla de inicio":"Chrome: menu > Agregar a pantalla de inicio"
        )
      ),
      h('button',{onClick:dismissInstall,style:{background:'none',border:'none',color:'rgba(255,255,255,0.7)',fontSize:'18px',cursor:'pointer',padding:'0',flexShrink:0}},'×')
    ),
    h('div',{style:{background:'#fff',borderBottom:'1px solid rgba(0,0,0,0.09)',padding:'14px 18px',position:'sticky',top:0,zIndex:10,display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',null,
        h('div',{style:{fontSize:'10px',color:'#999',fontWeight:'600',letterSpacing:'0.08em',textTransform:'uppercase'}},'Asesoría Personalizada'),
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},h('div',{style:{fontSize:'17px',fontWeight:'800'}},user),h('button',{onClick:logout,style:{background:'none',border:'none',cursor:'pointer',fontSize:'10px',color:'#ddd',padding:0}},'cambiar')),
        h('div',{style:{fontSize:'11px',color:'#999',marginTop:'1px'}},wk.label)
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'5px',alignItems:'flex-end'}},
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}},
          h('button',{onClick:saveProgress,disabled:saving,style:{borderRadius:'8px',padding:'8px 10px',fontSize:'11px',fontWeight:'700',cursor:'pointer',border:'1px solid rgba(0,0,0,0.12)',background:saved==='progreso'?'#EBF4FF':'#fff',color:saved==='progreso'?B:'#555'}},saving?'...':(saved==='progreso'?'✓ Progreso':'Guardar progreso')),
          h('button',{onClick:save,disabled:saving||saved===true,style:{borderRadius:'8px',padding:'8px 10px',fontSize:'11px',fontWeight:'700',cursor:saving||saved===true?'default':'pointer',border:'none',background:saved===true?'#EAF7F2':'#111',color:saved===true?G:'#fff'}},saving?'...':(saved===true?'✓ Sem. guardada':'Guardar semana')),
          h('button',{onClick:resetWeek,style:{borderRadius:'8px',padding:'8px 10px',fontSize:'11px',fontWeight:'600',cursor:'pointer',border:'1px solid rgba(239,68,68,0.3)',background:'#FFF5F5',color:'#EF4444'}},'↺ Resetear'),
          h('button',{onClick:prevWeek,disabled:(wk.num||1)<=1,style:{borderRadius:'8px',padding:'8px 10px',fontSize:'11px',fontWeight:'600',cursor:(wk.num||1)<=1?'default':'pointer',border:'1px solid rgba(0,0,0,0.1)',background:'#F8F8F8',color:(wk.num||1)<=1?'#ccc':'#555'}},'← Sem anterior'),
          h('button',{onClick:newWeek,style:{borderRadius:'8px',padding:'8px 10px',fontSize:'11px',fontWeight:'600',cursor:'pointer',border:'1px solid rgba(0,0,0,0.1)',background:'#F8F8F8',color:'#555'},'gridColumn':'2'},'Nueva sem →')
        )
      )
    ),
    h('div',{style:{padding:'14px',paddingBottom:'80px'}},
      tab==='d'&&h(Dashboard,null),
      tab==='t'&&h(Training,{key:'training',exes,setExes,setSaved,user,cfg,setCfg,sessionReps,setSessionReps,sessionKg,setSessionKg,hist,wk,loadingExes}),
      tab==='die'&&h(Diet,{key:'diet',hab,user,menusVer,metaAgua,metaSal}),
      tab==='n'&&h(Cumplimiento,{key:'cumplimiento',nut,toggleMeal,toggleAguaOk,hab,setHab,setSaved,metaAgua,metaSal,nivel,tC,tA,pC,pA}),
      tab==='hb'&&h(Mediciones,{key:'mediciones',hab,setHab,setSaved,pp,pc,sC}),
      tab==='hiit'&&h(Hiit,{key:'hiit',cfg,hiitData,setHiitData,setSaved})
    ),
    h('div',{style:{background:'#fff',borderTop:'1px solid rgba(0,0,0,0.08)',display:'flex',position:'sticky',bottom:0,zIndex:10}},
      TABS.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:'10px 2px 14px',fontSize:'10px',background:'none',border:'none',borderTop:tab===t.id?'2px solid #111':'2px solid transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',color:tab===t.id?'#111':'#999',fontWeight:tab===t.id?'700':'400'}},h('span',{style:{fontSize:'17px'}},t.ic),t.l))
    )
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
